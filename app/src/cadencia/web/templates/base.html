<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Cadencia{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="site-header">
    <h1>
      <a href="/" style="color: inherit; text-decoration: none;">Cadencia</a>
      <span style="font-weight: 400; font-size: 14px; margin-left: 16px;">
        <a href="/people">People</a>
      </span>
    </h1>
    <div class="backup-status {% if backup_overdue %}overdue{% endif %}">
      {% if backup_overdue %}
        backup: OVERDUE
      {% elif backup_ts %}
        last backup: {{ backup_ts }}
      {% else %}
        backup: never
      {% endif %}
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
